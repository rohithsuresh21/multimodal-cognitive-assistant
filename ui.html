<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MCA — Multimodal Cognitive Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0D1117;color:#E6E8F0;height:100vh;display:flex;flex-direction:column}
  header{background:#161B22;border-bottom:1px solid #30363D;padding:14px 24px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;color:#7B7FF5;font-weight:700;letter-spacing:.5px}
  header span{font-size:11px;color:#8B949E;background:#21262D;padding:2px 8px;border-radius:10px}
  .main{display:flex;flex:1;overflow:hidden}

  /* Sidebar */
  .sidebar{width:280px;background:#161B22;border-right:1px solid #30363D;display:flex;flex-direction:column;padding:16px}
  .sidebar h2{font-size:11px;color:#8B949E;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .drop-zone{border:2px dashed #30363D;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:12px}
  .drop-zone:hover,.drop-zone.drag{border-color:#7B7FF5;background:#1C2030}
  .drop-zone p{font-size:12px;color:#8B949E;margin-top:6px}
  .drop-zone .icon{font-size:28px}
  #fileInput{display:none}
  .upload-btn{width:100%;padding:9px;background:#7B7FF5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
  .upload-btn:hover{background:#6366d1}
  .upload-btn:disabled{background:#30363D;cursor:not-allowed}
  .file-list{margin-top:16px;flex:1;overflow-y:auto}
  .file-item{background:#21262D;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px}
  .file-item .fname{color:#2ECC87;font-weight:600;word-break:break-all}
  .file-item .fmeta{color:#8B949E;margin-top:2px}
  .status-bar{margin-top:8px;padding:8px 12px;border-radius:8px;font-size:12px;display:none}
  .status-bar.ok{background:#0D3321;color:#2ECC87;display:block}
  .status-bar.err{background:#3D0D0D;color:#E05C5C;display:block}
  .status-bar.loading{background:#1C2030;color:#7B7FF5;display:block}

  /* Chat */
  .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:75%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word}
  .msg.user{background:#1C2040;border:1px solid #2A2F5A;align-self:flex-end;color:#C9D1D9}
  .msg.assistant{background:#161B22;border:1px solid #30363D;align-self:flex-start;color:#E6E8F0}
  .msg.assistant .label{font-size:10px;color:#7B7FF5;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .msg.assistant .trust{font-size:10px;color:#8B949E;margin-top:6px;padding-top:6px;border-top:1px solid #30363D}
  .msg.assistant .trust span{color:#2ECC87}
  .msg.thinking{color:#8B949E;font-style:italic;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .welcome{text-align:center;padding:40px 20px;color:#8B949E}
  .welcome h2{color:#7B7FF5;font-size:18px;margin-bottom:8px}
  .welcome p{font-size:13px;line-height:1.7}

  /* Input bar */
  .input-bar{padding:16px 20px;background:#161B22;border-top:1px solid #30363D;display:flex;gap:10px}
  .input-bar textarea{flex:1;background:#21262D;border:1px solid #30363D;border-radius:10px;padding:10px 14px;color:#E6E8F0;font-size:13px;resize:none;height:44px;max-height:120px;font-family:inherit;line-height:1.5;transition:.2s}
  .input-bar textarea:focus{outline:none;border-color:#7B7FF5}
  .send-btn{padding:0 18px;background:#7B7FF5;border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:18px;transition:.2s}
  .send-btn:hover{background:#6366d1}
  .send-btn:disabled{background:#30363D;cursor:not-allowed}
</style>
</head>
<body>
<header>
  <h1>⚡ Multimodal Cognitive Assistant</h1>
  <span>RTX 4060 · Mistral-7B · Local RAG</span>
</header>
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📂 Upload Files</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📄</div>
      <p>Drop PDF, DOCX, CSV or TXT<br>or click to browse</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.docx,.csv,.txt"/>
    <button class="upload-btn" id="uploadBtn" disabled>Upload & Ingest</button>
    <div class="status-bar" id="statusBar"></div>
    <div class="file-list" id="fileList"></div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome">
        <h2>Hello! I'm your Cognitive Assistant</h2>
        <p>Upload your documents on the left, then ask me anything about them.<br>
        I'll search your knowledge base and answer using Mistral.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="queryInput" placeholder="Ask anything about your uploaded files..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const statusBar = document.getElementById('statusBar');
  const fileList = document.getElementById('fileList');
  const messages = document.getElementById('messages');
  const queryInput = document.getElementById('queryInput');
  const sendBtn = document.getElementById('sendBtn');
  let selectedFile = null;
  let chatHistory = [];

  // Drag and drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag');
    if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); });

  function selectFile(f) {
    selectedFile = f;
    dropZone.querySelector('p').textContent = f.name;
    uploadBtn.disabled = false;
  }

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    uploadBtn.disabled = true;
    setStatus('loading', `Uploading ${selectedFile.name}...`);
    const fd = new FormData();
    fd.append('file', selectedFile);
    try {
      const res = await fetch('/upload', { method: 'POST', body: fd });
      const data = await res.json();
      if (res.ok) {
        setStatus('ok', `✓ ${data.message}`);
        addFileItem(data.file, data.type || '', data.word_count);
        dropZone.querySelector('p').textContent = 'Drop PDF, DOCX, CSV or TXT\nor click to browse';
        selectedFile = null; fileInput.value = '';
      } else {
        setStatus('err', `✗ ${data.detail}`);
      }
    } catch (e) {
      setStatus('err', '✗ Upload failed. Is the server running?');
    }
    uploadBtn.disabled = false;
  });

  function setStatus(type, msg) {
    statusBar.className = 'status-bar ' + type;
    statusBar.textContent = msg;
  }

  function addFileItem(name, type, words) {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `<div class="fname">📎 ${name}</div><div class="fmeta">${type.toUpperCase()} · ${words} words</div>`;
    fileList.prepend(div);
  }

  // Load existing files on page load
  fetch('/files').then(r => r.json()).then(d => {
    (d.files || []).forEach(f => addFileItem(f.filename, f.type, f.word_count));
  }).catch(() => {});

  // Chat
  sendBtn.addEventListener('click', sendMessage);
  queryInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  queryInput.addEventListener('input', () => {
    queryInput.style.height = '44px';
    queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px';
  });

  async function sendMessage() {
    const text = queryInput.value.trim();
    if (!text) return;
    queryInput.value = ''; queryInput.style.height = '44px';
    sendBtn.disabled = true;

    // Remove welcome message
    const welcome = messages.querySelector('.welcome');
    if (welcome) welcome.remove();

    appendMsg('user', text);
    const thinking = appendMsg('assistant', '...', true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, history: chatHistory })
      });
      const data = await res.json();
      thinking.remove();

      const reply = data.assistant?.response_text || '...';
      const trust = data.trust_score ?? '—';
      const mode = data.response_mode || '—';
      const intent = data.intent_profile || '—';

      const msgEl = document.createElement('div');
      msgEl.className = 'msg assistant';
      msgEl.innerHTML = `
        <div class="label">Assistant</div>
        <div>${escapeHtml(reply)}</div>
        <div class="trust">Trust: <span>${trust}</span> · Mode: <span>${mode}</span> · Intent: <span>${intent}</span></div>
      `;
      messages.appendChild(msgEl);
      messages.scrollTop = messages.scrollHeight;

      chatHistory.push({role:'user', content: text});
      chatHistory.push({role:'assistant', content: reply});
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    } catch (e) {
      thinking.remove();
      appendMsg('assistant', '✗ Error connecting to server. Is main.py running?');
    }
    sendBtn.disabled = false;
  }

  function appendMsg(role, text, isThinking=false) {
    const div = document.createElement('div');
    div.className = 'msg ' + role + (isThinking ? ' thinking' : '');
    if (role === 'user') {
      div.textContent = text;
    } else if (isThinking) {
      div.textContent = 'Thinking...';
    } else {
      div.innerHTML = `<div class="label">Assistant</div><div>${escapeHtml(text)}</div>`;
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
